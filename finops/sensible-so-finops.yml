meters:
  - name: subscription_fee
    description: Flat monthly subscription per plan tier (Growth $499, Scale $1,499, Enterprise custom).
    unit: month
    aggregation: max
    dimensions:
      - plan
      - environment
  - name: extractions_consumed
    description: Successful document extractions counted against the monthly allotment.
    unit: extraction
    aggregation: sum
    dimensions:
      - document_type
      - configuration
      - environment
  - name: overage_extractions
    description: Per-document charge after the monthly allotment is exhausted (Growth & Scale, $0.50/doc).
    unit: extraction
    aggregation: sum
    dimensions:
      - document_type
      - configuration
recommendations:
  - Tag extractions by document_type and configuration so cost can be attributed to a business surface (e.g. bank-statements, loss-runs, ACORD-25).
  - Use async extraction + webhook pattern to avoid burning the rps budget on polling.
  - Set up monthly usage alerts before the overage cliff; both Growth (750) and Scale (3,200) charge $0.50 per extra extraction.
  - Use the GET /extractions/statistics endpoint to break down coverage per config and identify low-yield configs that should be retired or merged.
  - Promote configs through development → production environments to avoid burning production extractions on tuning.
