sharedFeatures:
  - Unlimited document layouts and data fields
  - Unlimited reference documents
  - Automatic and selective OCR
  - Computer vision-enhanced table detection
  - Invoice recognition
  - Document splitting
  - 150+ pre-built configurations
notes:
  - Pricing is per-document (linear, no token volatility). Each successful extraction counts as one document against the monthly allotment.
  - Human review is available on Scale and Enterprise only.
  - Pricing observed 2026-05-25; verify against https://www.sensible.so/pricing.
